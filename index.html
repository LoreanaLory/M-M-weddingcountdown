<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M&M Wedding Countdown</title>


<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:300px;
    font-family:'Old Standard TT', serif;
}

*{
    box-sizing:border-box;
}

.bigday-countdown{
    width:100%;
    height:300px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    color:white;
    text-align:center;

    font-family:'Old Standard TT', serif;

    background:none;
}

.content{
    width:100%;
    padding:20px;
}

#timer{
    font-size:clamp(42px,7vw,90px);
    font-weight:700;
    line-height:1;
    letter-spacing:2px;
    margin-bottom:15px;
}

.labels{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;

    font-size:14px;
    letter-spacing:2px;

    margin-bottom:20px;
}

.headline{
    font-size:clamp(22px,2.5vw,40px);
    font-weight:700;
}

@media (max-width:768px){

    #timer{
        font-size:36px;
    }

    .labels{
        gap:12px;
        font-size:11px;
    }

    .headline{
        font-size:20px;
    }
}

</style>
</head>

<body>

<div class="bigday-countdown">

    <div class="content">

        <div id="timer">000:00:00:00</div>

        <div class="labels">
            <span>DAYS</span>
            <span>HOURS</span>
            <span>MINS</span>
            <span>SECS</span>
        </div>

        <div class="headline">
            BEFORE THE BIG DAY
        </div>

    </div>

</div>

<script>

const timer = document.getElementById("timer");
const targetDate = new Date("2027-03-29T00:00:00").getTime();

function updateCountdown(){

    const now = Date.now();
    const diff = targetDate - now;

    if(diff <= 0){
        timer.textContent = "000:00:00:00";
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const mins = Math.floor((diff / (1000 * 60)) % 60);
    const secs = Math.floor((diff / 1000) % 60);

    timer.textContent =
        days + ":" +
        String(hours).padStart(2,"0") + ":" +
        String(mins).padStart(2,"0") + ":" +
        String(secs).padStart(2,"0");
}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
