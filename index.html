<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M&M Wedding Countdown</title>

<link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

*{
    box-sizing:border-box;
}

.bigday-countdown{
    width:100%;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    position:relative;
    overflow:hidden;

    color:white;
    text-align:center;

    font-family:'Old Standard TT', serif;

    background:
        linear-gradient(
            135deg,
            #7a8e7c 0%,
            #667967 45%,
            #283618 100%
        );
}

/* Dezente Struktur ohne Flackern */
.bigday-countdown::before{
    content:"";
    position:absolute;
    inset:0;

    background-image:
        repeating-linear-gradient(
            45deg,
            rgba(255,255,255,0.015) 0px,
            rgba(255,255,255,0.015) 1px,
            transparent 1px,
            transparent 10px
        );

    pointer-events:none;
}

.content{
    position:relative;
    z-index:2;
    width:100%;
    padding:60px 20px;
}

#timer{
    font-size:clamp(60px,8vw,120px);
    font-weight:700;
    line-height:0.95;

    letter-spacing:2px;

    margin-bottom:20px;

    text-shadow:
        0 2px 10px rgba(0,0,0,0.18);
}

.labels{
    display:flex;
    justify-content:center;
    gap:60px;
    flex-wrap:wrap;

    font-size:18px;
    letter-spacing:2px;

    margin-bottom:35px;
}

.headline{
    font-size:clamp(28px,3vw,54px);
    font-weight:700;
    letter-spacing:0.5px;

    text-shadow:
        0 2px 6px rgba(0,0,0,0.15);
}

@media (max-width:768px){

    .content{
        padding:40px 15px;
    }

    #timer{
        font-size:42px;
        letter-spacing:1px;
    }

    .labels{
        gap:18px;
        font-size:12px;
    }

    .headline{
        font-size:24px;
    }
}

</style>
</head>

<body>

<div class="bigday-countdown">

    <div class="content">

        <div id="timer">000:00:00:00</div>

        <div class="labels">
            <span>DAYS</span>
            <span>HOURS</span>
            <span>MINS</span>
            <span>SECS</span>
        </div>

        <div class="headline">
            BEFORE THE BIG DAY
        </div>

    </div>

</div>

<script>
const targetDate = new Date("2027-03-29T00:00:00").getTime();

function updateCountdown() {

    const now = Date.now();
    const diff = targetDate - now;

    if(diff <= 0){
        document.getElementById("timer").innerHTML =
        "000:00:00:00";
        return;
    }

    const days =
        Math.floor(diff / (1000 * 60 * 60 * 24));

    const hours =
        Math.floor((diff / (1000 * 60 * 60)) % 24);

    const mins =
        Math.floor((diff / (1000 * 60)) % 60);

    const secs =
        Math.floor((diff / 1000) % 60);

    document.getElementById("timer").innerHTML =
        days + ":" +
        String(hours).padStart(2,"0") + ":" +
        String(mins).padStart(2,"0") + ":" +
        String(secs).padStart(2,"0");
}

updateCountdown();
setInterval(updateCountdown,1000);
</script>

</body>
</html>
