<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Countdown</title>

<style>
html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:300px;
    overflow:hidden;
    background:transparent;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Georgia, serif;
    color:#ffffff;
}

.container{
    width:100%;
    text-align:center;
    padding:20px;
}

#timer{
    font-size:60px;
    font-weight:700;
    line-height:1;
    margin-bottom:15px;
}

.labels{
    font-size:12px;
    letter-spacing:2px;
    margin-bottom:20px;
}

.headline{
    font-size:24px;
    font-weight:700;
}

@media (max-width:768px){

    #timer{
        font-size:38px;
    }

    .headline{
        font-size:18px;
    }

    .labels{
        font-size:10px;
        letter-spacing:1px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div id="timer">000:00:00:00</div>

    <div class="labels">
        DAYS · HOURS · MINS · SECS
    </div>

    <div class="headline">
        BEFORE THE BIG DAY
    </div>

</div>

<script>
const timer = document.getElementById("timer");
const weddingDate = new Date("2027-03-29T00:00:00").getTime();

function updateCountdown(){

    const now = Date.now();
    const difference = weddingDate - now;

    if(difference <= 0){
        timer.textContent = "000:00:00:00";
        return;
    }

    const days = Math.floor(difference / 86400000);
    const hours = Math.floor(difference / 3600000) % 24;
    const minutes = Math.floor(difference / 60000) % 60;
    const seconds = Math.floor(difference / 1000) % 60;

    timer.textContent =
        days + ":" +
        String(hours).padStart(2,"0") + ":" +
        String(minutes).padStart(2,"0") + ":" +
        String(seconds).padStart(2,"0");
}

updateCountdown();
setInterval(updateCountdown,1000);
</script>

</body>
</html>
